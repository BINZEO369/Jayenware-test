<div id="cart-drawer" class="fixed top-0 right-0 w-full max-w-sm sm:max-w-md h-full bg-white z-[60] shadow-2xl flex flex-col">
    <div class="p-4 sm:p-6 border-b flex justify-between items-center bg-soft">
        <h2 class="text-base sm:text-lg font-black uppercase tracking-tighter">Shopping Bag</h2>
        <button onclick="toggleCart()" class="text-gray-400 hover:text-primary text-lg sm:text-xl transition p-1" aria-label="Close Cart"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="cart-items" class="flex-grow overflow-y-auto p-4 sm:p-6 space-y-3 sm:space-y-4 custom-scroll"></div>
    <div class="p-4 sm:p-6 border-t bg-soft">
        <div class="mb-3 sm:mb-4"><div class="flex gap-1.5 sm:gap-2"><input type="text" id="promo-input" placeholder="Promo Code" class="flex-grow p-2.5 sm:p-3 rounded-xl border text-xs sm:text-sm outline-none"><button onclick="applyPromo()" class="px-3 sm:px-4 bg-primary text-white rounded-xl text-[9px] sm:text-[10px] font-bold uppercase">Apply</button></div><p id="promo-msg" class="text-[9px] sm:text-[10px] mt-1 font-bold"></p></div>
        <div class="space-y-1.5 sm:space-y-2 mb-4 sm:mb-6 text-[10px] sm:text-xs"><div class="flex justify-between text-gray-500"><span>Subtotal</span><span id="cart-subtotal">৳ 0.00</span></div><div id="promo-row" class="hidden flex justify-between text-green-600 font-bold"><span>Discount</span><span id="cart-discount">- ৳ 0.00</span></div><div class="flex justify-between border-t pt-2 sm:pt-3"><span class="font-bold uppercase">Total</span><span id="cart-total" class="text-lg sm:text-xl font-black">৳ 0.00</span></div></div>
        <button onclick="showCheckoutOptions()" class="w-full py-3 sm:py-4 bg-primary text-white rounded-2xl font-bold uppercase tracking-wider text-[10px] sm:text-xs hover:bg-accent transition shadow-lg">Checkout</button>
    </div>
</div>
