<body class="antialiased">
    <div id="header-container"></div>
    
    <main class="pt-14 sm:pt-16 lg:pt-20">
        <section id="products" class="page-section active-page fade-in py-6 sm:py-8 lg:py-12">
            <div class="max-w-7xl mx-auto px-3 sm:px-4">
                <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
                    <aside class="hidden lg:block w-56 xl:w-64 shrink-0">
                        <div class="sticky top-24 space-y-6">
                            <div>
                                <h3 class="font-bold text-xs sm:text-sm uppercase tracking-wider mb-3">Categories</h3>
                                <div id="sidebar-categories" class="space-y-1"></div>
                            </div>
                            <div>
                                <h3 class="font-bold text-xs sm:text-sm uppercase tracking-wider mb-3">Price Range</h3>
                                <div class="flex gap-2">
                                    <input type="number" id="filter-min-price" placeholder="Min" class="w-full p-2 border rounded-lg text-[10px] sm:text-xs">
                                    <input type="number" id="filter-max-price" placeholder="Max" class="w-full p-2 border rounded-lg text-[10px] sm:text-xs">

                            </div>
                        </div>
                    </aside>
                    
                    <div class="flex-grow min-w-0">
                        <div class="flex justify-between items-center mb-4 sm:mb-6">
                            <h2 class="text-xl sm:text-2xl lg:text-3xl font-black font-serif truncate">All Products</h2>
                            <div class="flex gap-1.5 sm:gap-2 shrink-0">
                                <button onclick="toggleMobileFilters()" class="lg:hidden px-3 sm:px-4 py-2 border rounded-full text-[9px] sm:text-[10px] font-bold"><i class="fa-solid fa-sliders mr-1"></i>Filter</button>
                                <div class="relative" id="sort-container">
                                    <button onclick="toggleSortMenu()" class="px-3 sm:px-4 py-2 border rounded-full text-[9px] sm:text-[10px] font-bold flex items-center gap-1.5">
                                        <i class="fa-solid fa-arrow-down-wide-short"></i>
                                        <span id="current-sort-label" class="hidden sm:inline">Latest</span>
                                        <i class="fa-solid fa-chevron-down text-[8px]"></i>
                                    </button>
                                    <div id="sort-dropdown" class="hidden absolute right-0 mt-2 w-40 sm:w-48 bg-white rounded-2xl shadow-2xl border z-50 p-1">
                                        <button onclick="handleSorting('new','Latest')" class="w-full text-left px-4 py-2.5 text-[10px] font-bold hover:bg-gray-50 rounded-xl transition">Latest</button>
                                        <button onclick="handleSorting('price-low','Price: Low-High')" class="w-full text-left px-4 py-2.5 text-[10px] font-bold hover:bg-gray-50 rounded-xl transition">Low-High</button>
                                        <button onclick="handleSorting('price-high','Price: High-Low')" class="w-full text-left px-4 py-2.5 text-[10px] font-bold hover:bg-gray-50 rounded-xl transition">High-Low</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div id="products-grid" class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-4 lg:gap-5"></div>
                    </div>
                </div>

                            <h3 class="font-black text-lg uppercase">Filters</h3>

                        </div>
                        <div class="space-y-6">
                            <div>
                                <h4 class="font-bold text-xs uppercase mb-3">Categories</h4>
                                <div id="mobile-filter-categories" class="space-y-1"></div>
                            </div>
                            <div>
                                <h4 class="font-bold text-xs uppercase mb-3">Price Range</h4>
                                <div class="flex gap-2">
                                    <input type="number" id="m-filter-min-price" placeholder="Min" class="w-full p-3 border rounded-xl text-sm">
                                    <input type="number" id="m-filter-max-price" placeholder="Max" class="w-full p-3 border rounded-xl text-sm">
                                </div>
                            </div>
                        </div>
                        <button onclick="applyMobileFilters();toggleMobileFilters()" class="w-full py-4 bg-primary text-white rounded-2xl font-bold mt-8 uppercase text-sm">Apply Filters</button>
                    </div>
