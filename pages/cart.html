<body class="antialiased">
    <div id="header-container"></div>
    
    <main class="pt-14 sm:pt-16 lg:pt-20">
        <section id="cart-page" class="page-section active-page fade-in py-6 sm:py-8 lg:py-12">
            <div class="max-w-2xl mx-auto px-3 sm:px-4">
                <h2 class="text-2xl sm:text-3xl lg:text-4xl font-black font-serif text-center mb-8">Shopping Bag</h2>
                <div id="cart-page-items" class="space-y-3 sm:space-y-4 mb-6 sm:mb-8"></div>
                <div class="bg-white rounded-2xl p-4 sm:p-6 shadow-xl border">
                    <div class="mb-3 sm:mb-4">
                        <div class="flex gap-1.5 sm:gap-2">
                            <input type="text" id="promo-input-page" placeholder="Promo Code" class="flex-grow p-2.5 sm:p-3 rounded-xl border text-xs sm:text-sm outline-none">
                            <button onclick="applyPromoPage()" class="px-3 sm:px-4 bg-primary text-white rounded-xl text-[9px] sm:text-[10px] font-bold uppercase">Apply</button>
                        </div>
                        <p id="promo-msg-page" class="text-[9px] sm:text-[10px] mt-1 font-bold"></p>
                    </div>
                    <div class="space-y-1.5 sm:space-y-2 mb-4 sm:mb-6 text-[10px] sm:text-xs">
                        <div class="flex justify-between text-gray-500"><span>Subtotal</span><span id="cart-page-subtotal">৳ 0.00</span></div>
                        <div id="promo-row-page" class="hidden flex justify-between text-green-600 font-bold"><span>Discount</span><span id="cart-page-discount">- ৳ 0.00</span></div>
                        <div class="flex justify-between border-t pt-2 sm:pt-3"><span class="font-bold uppercase">Total</span><span id="cart-page-total" class="text-lg sm:text-xl font-black">৳ 0.00</span></div>
                    </div>
                    <button onclick="showCheckoutOptions()" class="w-full py-3 sm:py-4 bg-primary text-white rounded-2xl font-bold uppercase tracking-wider text-[10px] sm:text-xs hover:bg-accent transition shadow-lg">Checkout</button>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-container"></div>
    <div id="cart-drawer-container"></div>
    <div id="modals-container"></div>

    <div class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-50">

            <i class="fa-brands fa-facebook-messenger"></i>
        </a>
        <span class="absolute top-0 right-0 w-2.5 h-2.5 sm:w-3 sm:h-3 bg-green-500 rounded-full border-2 border-white" aria-label="Online"></span>
    </div>
